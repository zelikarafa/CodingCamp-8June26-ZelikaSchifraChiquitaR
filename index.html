<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- App Title Bar -->
  <div id="app-title-bar">
    <h1>Expense &amp; Budget Visualizer</h1>
    <button id="theme-toggle" aria-label="Toggle theme">🌙</button>
  </div>

  <!-- Header: Balance Display -->
  <header id="app-header">
    <div id="balance-display">
      <span id="balance-label">Total Balance</span>
      <span id="balance-amount">Rp0</span>
    </div>
  </header>

  <!-- Info/error banner (hidden by default) -->
  <div id="app-banner" role="alert" hidden></div>

  <!-- Main content -->
  <main id="app-main">
    <!-- Input Form -->
    <section id="form-section">
      <h2>Add Transaction</h2>
      <form id="transaction-form" novalidate>
        <label for="item-name">Item Name</label>
        <input id="item-name" type="text" placeholder="e.g. Cilok" autocomplete="off">

        <label for="item-amount">Amount (Rp)</label>
        <input id="item-amount" type="number" min="1" step="1" placeholder="e.g. 15000">

        <label for="item-category">Category</label>
        <select id="item-category">
          <option value="">Select category</option>
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Fun">🎉 Fun</option>
        </select>

        <p id="form-error" role="alert" hidden></p>
        <button type="submit" id="submit-btn">Add Transaction</button>
      </form>
    </section>

    <!-- Transaction List + Sort Control -->
    <section id="list-section">
      <div id="list-header">
        <h2>Transactions</h2>
        <select id="sort-control" aria-label="Sort transactions">
          <option value="none">Sort: Default</option>
          <option value="asc">Amount ↑</option>
          <option value="desc">Amount ↓</option>
        </select>
      </div>
      <ul id="transaction-list" aria-live="polite"></ul>
    </section>

    <!-- Pie Chart -->
    <section id="chart-section">
      <h2>Spending by Category</h2>
      <div id="chart-container">
        <canvas id="spending-chart"></canvas>
        <p id="chart-empty-msg" hidden>No transactions yet.</p>
      </div>
    </section>

    <!-- Monthly Summary (optional, hidden by default) -->
    <section id="summary-section" hidden>
      <h2>Monthly Summary</h2>
      <div id="monthly-summary"></div>
    </section>
    <button id="toggle-summary-btn">Show Monthly Summary</button>
  </main>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <!-- App logic -->
  <script src="js/app.js"></script>
</body>
</html>
